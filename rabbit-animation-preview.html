<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shinny的作品集</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <style>
      :root {
        --bg: #faf9f6;
        --ink: #2f2621;
        --muted: #746a62;
        --rabbit: #cacac9;
        --accent: #b9372e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        color: var(--ink);
        background: var(--bg);
        font-family: "FZLanTingYuanGBK", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      button {
        font: inherit;
      }

      .preview-stage {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        cursor: pointer;
        isolation: isolate;
      }

      .preview-copy {
        position: relative;
        z-index: 2;
        width: min(calc(100% - 144px), 1040px);
        margin: 0 auto;
        padding-top: clamp(150px, 24vh, 230px);
        pointer-events: none;
      }

      .preview-copy h1 {
        margin: 0;
        font-size: clamp(3.4rem, 5vw, 4rem);
        font-weight: 600;
        line-height: 1.04;
        letter-spacing: -0.05em;
      }

      .preview-copy h2 {
        margin: 58px 0 0;
        font-size: clamp(1.8rem, 3vw, 2.45rem);
        line-height: 1.2;
      }

      .preview-copy p {
        max-width: 720px;
        margin: 28px 0 0;
        color: var(--muted);
        font-size: 1.08rem;
        font-weight: 600;
        line-height: 1.8;
      }

      .rabbit-scene {
        position: absolute;
        top: clamp(74px, 12vh, 120px);
        right: -102px;
        z-index: 1;
        width: clamp(380px, 32vw, 520px);
        aspect-ratio: 421 / 313;
        pointer-events: none;
        transform-origin: 72% 87%;
      }

      .rabbit-art {
        display: block;
        width: 100%;
        height: auto;
        max-width: none;
        transform-origin: 70% 86%;
      }

      .dust {
        position: absolute;
        right: 31%;
        bottom: -4%;
        width: 12px;
        height: 12px;
        border: 3px solid var(--rabbit);
        border-radius: 50%;
        opacity: 0;
      }

      .dust-2 {
        right: 22%;
        bottom: -1%;
        width: 8px;
        height: 8px;
      }

      .preview-stage.is-playing .rabbit-scene {
        animation: rabbit-hop 1.34s cubic-bezier(0.22, 0.74, 0.24, 1) both;
      }

      .preview-stage.is-playing .rabbit-art {
        animation: rabbit-body 1.34s linear both;
      }

      .preview-stage.is-playing .dust-1 {
        animation: dust-left 0.45s 0.92s ease-out both;
      }

      .preview-stage.is-playing .dust-2 {
        animation: dust-right 0.42s 0.96s ease-out both;
      }

      @keyframes rabbit-hop {
        0% {
          transform: translate3d(470px, 84px, 0) rotate(5deg);
        }

        12% {
          transform: translate3d(430px, 98px, 0) rotate(7deg);
        }

        24% {
          transform: translate3d(350px, 16px, 0) rotate(-4deg);
        }

        51% {
          transform: translate3d(124px, -116px, 0) rotate(-9deg);
        }

        72% {
          transform: translate3d(12px, -28px, 0) rotate(2deg);
        }

        79% {
          transform: translate3d(0, 8px, 0) rotate(0deg);
        }

        88% {
          transform: translate3d(0, -14px, 0) rotate(-1deg);
        }

        100% {
          transform: translate3d(0, 0, 0) rotate(0deg);
        }
      }

      @keyframes rabbit-body {
        0%,
        8% {
          transform: scale(0.96, 1.04);
        }

        12% {
          transform: scale(1.08, 0.88);
        }

        25% {
          transform: scale(0.92, 1.08);
        }

        58% {
          transform: scale(1.02, 0.98);
        }

        78% {
          transform: scale(1.1, 0.86);
        }

        89% {
          transform: scale(0.97, 1.04);
        }

        100% {
          transform: scale(1);
        }
      }

      @keyframes dust-left {
        0% {
          opacity: 0;
          transform: translate3d(0, 0, 0) scale(0.45);
        }

        25% {
          opacity: 0.62;
        }

        100% {
          opacity: 0;
          transform: translate3d(-54px, -22px, 0) scale(1.4);
        }
      }

      @keyframes dust-right {
        0% {
          opacity: 0;
          transform: translate3d(0, 0, 0) scale(0.45);
        }

        25% {
          opacity: 0.5;
        }

        100% {
          opacity: 0;
          transform: translate3d(38px, -18px, 0) scale(1.25);
        }
      }

      .preview-controls {
        position: fixed;
        right: 28px;
        bottom: 26px;
        z-index: 4;
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .preview-hint {
        margin: 0;
        color: #968e87;
        font-size: 0.82rem;
        letter-spacing: 0.02em;
      }

      .replay-button {
        min-width: 88px;
        padding: 10px 18px;
        border: 2px solid var(--accent);
        border-radius: 999px;
        color: #fff;
        background: var(--accent);
        cursor: pointer;
        transition: transform 0.18s ease, background 0.18s ease;
      }

      .replay-button:hover {
        transform: translateY(-2px);
        background: #a8322a;
      }

      .replay-button:focus-visible {
        outline: 3px solid rgba(185, 55, 46, 0.24);
        outline-offset: 4px;
      }

      @media (max-width: 700px) {
        .preview-copy {
          width: calc(100% - 28px);
          padding-top: 210px;
        }

        .preview-copy h1 {
          font-size: 2.7rem;
        }

        .preview-copy h2 {
          margin-top: 42px;
          font-size: 1.7rem;
        }

        .preview-copy p {
          max-width: 86%;
          margin-top: 18px;
          font-size: 0.92rem;
        }

        .rabbit-scene {
          top: 45px;
          right: -104px;
          width: 310px;
        }

        .preview-hint {
          display: none;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .preview-stage.is-playing .rabbit-scene,
        .preview-stage.is-playing .rabbit-art,
        .preview-stage.is-playing .dust {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-stage is-playing" aria-label="兔子跳入动画预览，点击画面可重播">
      <div class="preview-copy">
        <h1>生活里的我</h1>
        <h2>极简主义者</h2>
        <p>我的一平米厨房，做饭只放油和生抽。简单的材料、固定的流程，也能过得很有秩序。</p>
      </div>

      <div class="rabbit-scene" aria-hidden="true">
        <span class="dust dust-1"></span>
        <span class="dust dust-2"></span>
        <img src="./assets/rabbit.svg" alt="" class="rabbit-art" />
      </div>

      <div class="preview-controls">
        <p class="preview-hint">点击空白区域也可以重播</p>
        <button class="replay-button" type="button">重播</button>
      </div>
    </main>

    <script>
      const stage = document.querySelector(".preview-stage");
      const replayButton = document.querySelector(".replay-button");

      const replay = () => {
        stage.classList.remove("is-playing");
        void stage.offsetWidth;
        stage.classList.add("is-playing");
      };

      stage.addEventListener("click", replay);
      replayButton.addEventListener("click", (event) => {
        event.stopPropagation();
        replay();
      });
    </script>
  </body>
</html>
